apiVersion: v1
kind: Service
metadata:
  name: {{ include "legal-ai.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "legal-ai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "legal-ai.selectorLabels" . | nindent 4 }}
    app: backend
