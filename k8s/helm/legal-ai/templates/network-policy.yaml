{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "legal-ai.fullname" . }}-backend-policy
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- include "legal-ai.selectorLabels" . | nindent 6 }}
      app: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Ingress Controller
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
  egress:
    # Allow egress to Redis
    - to:
        - podSelector:
            matchLabels:
              {{- include "legal-ai.selectorLabels" . | nindent 14 }}
              app: redis
    - ports:
        - protocol: TCP
          port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "legal-ai.fullname" . }}-redis-policy
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- include "legal-ai.selectorLabels" . | nindent 6 }}
      app: redis
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress only from Backend
    - from:
        - podSelector:
            matchLabels:
              {{- include "legal-ai.selectorLabels" . | nindent 14 }}
              app: backend
      ports:
        - protocol: TCP
          port: 6379
{{- end }}
