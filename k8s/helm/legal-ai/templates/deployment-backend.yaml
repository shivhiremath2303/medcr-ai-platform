apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "legal-ai.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "legal-ai.labels" . | nindent 4 }}
    app: backend
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "legal-ai.selectorLabels" . | nindent 6 }}
      app: backend
  template:
    metadata:
      labels:
        {{- include "legal-ai.selectorLabels" . | nindent 8 }}
        app: backend
      annotations:
        prometheus.io/scrape: {{ .Values.backend.env.METRICS_ENABLED | quote }}
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      # Enterprise Hardening: Least-privilege Service Account
      serviceAccountName: {{ include "legal-ai.fullname" . }}-backend
      automountServiceAccountToken: false
      
      # Pod-level Security Context (Restricted Standard)
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          
          # Container-level Security Context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          
          envFrom:
            - configMapRef:
                name: {{ include "legal-ai.fullname" . }}-config
            - secretRef:
                name: {{ include "legal-ai.fullname" . }}-secrets
          
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            # Increased threshold for large FAISS index loading on startup
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            # Ensure we allow some degradation without killing the traffic
            failureThreshold: 3
          
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads/documents
            - name: faiss
              mountPath: /app/data/faiss
            - name: metadata
              mountPath: /app/data/metadata
            # Hardening: Added temporary writable mounts for read-only root FS
            - name: tmp
              mountPath: /app/data/temp
            - name: cache
              mountPath: /app/data/cache
            - name: logs
              mountPath: /app/logs
      
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "legal-ai.fullname" . }}-uploads
        - name: faiss
          persistentVolumeClaim:
            claimName: {{ include "legal-ai.fullname" . }}-faiss
        - name: metadata
          persistentVolumeClaim:
            claimName: {{ include "legal-ai.fullname" . }}-metadata
        # Support for Read-Only root FS
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: logs
          emptyDir: {}
