apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "legal-ai.fullname" . }}-config
  namespace: {{ .Values.namespace }}
data:
  {{- range $key, $value := .Values.backend.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  REDIS_URL: "redis://{{ include "legal-ai.fullname" . }}-redis:6379/0"
  APP_NAME: "Legal AI Platform"
