apiVersion: v1
kind: Service
metadata:
  name: {{ include "legal-ai.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "legal-ai.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    {{- include "legal-ai.selectorLabels" . | nindent 4 }}
    app: redis
