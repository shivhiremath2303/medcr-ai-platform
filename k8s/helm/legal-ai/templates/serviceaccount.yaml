apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "legal-ai.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "legal-ai.labels" . | nindent 4 }}
  annotations:
    # Allows for future Cloud-native IAM integration (e.g. AWS IRSA, GCP Workload Identity)
    {{- toYaml .Values.backend.serviceAccount.annotations | nindent 4 }}
automountServiceAccountToken: false
