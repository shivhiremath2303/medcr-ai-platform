name: Docker Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  docker-build:
    name: Build & Verify Container
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create CI production environment
        run: |
          cat > .env.production <<EOF
          ENVIRONMENT=production
          GEMINI_API_KEY=dummy
          JWT_SECRET_KEY=$(openssl rand -hex 32) # gitleaks:allow
          CORS_ALLOWED_ORIGINS=["http://localhost"]
          REDIS_URL=redis://redis:6379/0
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build Backend Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: legal-ai-backend:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Compose Validation
        run: docker compose config

      - name: Verify Startup
        run: |
          docker compose up -d backend redis
          
          echo "Waiting for backend..."
          for i in {1..12}; do
            if curl -fs http://localhost:8000/health/ready; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 5
          done
          
          echo "Backend failed to start."
          docker compose ps
          docker compose logs backend
          exit 1

      - name: Container Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legal-ai-backend:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Cleanup
        if: always()
        run: docker compose down -v
