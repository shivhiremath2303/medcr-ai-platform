name: Docker Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'

jobs:
  docker-build:
    name: Build & Verify Container
    runs-on: ubuntu-latest

    env:
      # Safe dummy values for CI testing
      ENVIRONMENT: production
      GEMINI_API_KEY: "dummy-key-for-ci"
      JWT_SECRET_KEY: "ci-secret-key-that-is-not-the-default-one"
      CORS_ALLOWED_ORIGINS: '["http://localhost:8000"]'

    steps:
      - uses: actions/checkout@v4

      - name: Create dummy env file
        run: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env.production
          echo "JWT_SECRET_KEY=$JWT_SECRET_KEY" >> .env.production
          echo "CORS_ALLOWED_ORIGINS=$CORS_ALLOWED_ORIGINS" >> .env.production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: legal-ai-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Compose Validation
        run: |
          docker compose config

      - name: Verify Startup
        run: |
          # Pass required env vars to docker compose explicitly just in case
          ENVIRONMENT=production \
          GEMINI_API_KEY=$GEMINI_API_KEY \
          JWT_SECRET_KEY=$JWT_SECRET_KEY \
          CORS_ALLOWED_ORIGINS=$CORS_ALLOWED_ORIGINS \
          docker compose up -d backend redis
          
          echo "Waiting for services to initialize..."
          # Models are pre-downloaded, but let's give it enough time for FAISS/Redis
          sleep 30
          
          docker compose ps
          docker compose logs redis
          docker compose logs backend
          
          # Thorough readiness check (checks Redis connectivity)
          # Increased retries and timeout for CI stability
          curl -v --retry 10 --retry-delay 5 --retry-all-errors http://localhost:8000/health/ready || (docker compose logs backend && exit 1)

      - name: Container Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'legal-ai-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Cleanup
        if: always()
        run: docker compose down
