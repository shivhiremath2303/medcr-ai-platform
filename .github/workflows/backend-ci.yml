name: Backend CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        python-version:
          - "3.12"

    env:
      APP_NAME: "CI Test"
      APP_VERSION: "1.0.0"
      APP_DESCRIPTION: "CI Environment"

      GEMINI_API_KEY: "dummy-key"

      DEBUG: "true"

      HOST: "127.0.0.1"
      PORT: "8000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Show working directory
        run: |
          pwd
          ls -la
          python -c "import app; print('App imported successfully')"

      - name: Show domain models files
        run: |
          echo "Working dir: $(pwd)"
          echo "Listing app/domain:"
          ls -la app/domain || true
          echo "Listing app/domain/models:"
          ls -la app/domain/models || true

      - name: Run tests with coverage
        env:
          PYTHONPATH: "${{ github.workspace }}/backend"
        run: |
          echo "PYTHONPATH=$PYTHONPATH"
          python -c "import sys; print('sys.path:', sys.path)"
          coverage run -m pytest -q
          coverage xml -i

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml