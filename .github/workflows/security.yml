name: Security Audit & Supply Chain

on:
  push:
    branches: [ main, milestone-* ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly

permissions:
  contents: read
  security-events: write

jobs:
  python-security:
    name: Python Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pip-audit bandit safety cyclonedx-bom
      
      - name: Run pip-audit
        run: python -m pip_audit -r backend/requirements.txt
        # This baseline contains vulnerabilities that predate this PR. Keep the
        # scan visible while dependency upgrades are remediated separately.
        continue-on-error: true
      
      - name: Run Safety Check
        run: python -m safety scan -r backend/requirements.txt
        continue-on-error: true
      
      - name: Run Bandit (SAST)
        run: python -m bandit -r backend/app -ll -f json -o bandit-results.json || true
      
      - name: Generate Python SBOM
        run: python -m cyclonedx_py requirements backend/requirements.txt --output-format json --output-file backend-sbom.json || true
      
      - name: Upload Python SBOM
        uses: actions/upload-artifact@v4
        with:
          name: python-sbom
          path: backend-sbom.json

  node-security:
    name: Node Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --ignore-scripts
        continue-on-error: true
      
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Generate Node SBOM
        working-directory: frontend
        run: npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file ../frontend-sbom.json || true
      
      - name: Upload Node SBOM
        uses: actions/upload-artifact@v4
        with:
          name: node-sbom
          path: frontend-sbom.json

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for secret scanning
          persist-credentials: false
      
      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Allow baseline findings to not block the pipeline

  container-security:
    name: Container Security & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: legal-ai-backend:scan
          cache-from: type=gha
      
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legal-ai-backend:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true
      
      - name: Generate Container SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legal-ai-backend:scan
          format: 'cyclonedx'
          output: 'container-sbom.json'

      - name: Upload Container SBOM
        uses: actions/upload-artifact@v4
        with:
          name: container-sbom
          path: container-sbom.json
